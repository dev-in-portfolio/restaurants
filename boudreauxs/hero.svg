    <rect x="24" y="24" width="462" height="212" rx="8" fill="url(#mural)"/>
    <path d="M55 206c82-118 150-145 210-95 54 44 100 34 170-36" fill="none" stroke="#f8e3a4" stroke-width="16" stroke-linecap="round" opacity="0.86"/>
