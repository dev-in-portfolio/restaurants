    <path d="M410 650c18-190 46-348 88-470 28 92 32 186 20 288 68-58 120-68 155-24-74 38-118 92-145 164l-15 130z"/>
    <path d="M1320 620c-8-170-2-302 26-430 40 98 58 202 52 316 58-44 108-48 145-10-68 27-109 70-130 124l-10 120z"/>
