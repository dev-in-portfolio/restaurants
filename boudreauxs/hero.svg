<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" role="img" aria-labelledby="title desc">
  <title id="title">Louisiana bayou night meets NoDa street art</title>
  <desc id="desc">An original illustrated scene with cypress silhouettes, warm lantern light, water reflections and colorful geometric mural shapes.</desc>
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#071d1a"/>
      <stop offset="0.58" stop-color="#12372e"/>
      <stop offset="1" stop-color="#6f2f20"/>
    </linearGradient>
    <linearGradient id="water" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#041512"/>
      <stop offset="0.46" stop-color="#173f35"/>
      <stop offset="1" stop-color="#4c2119"/>
    </linearGradient>
    <radialGradient id="moon" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#fff5c8"/>
      <stop offset="0.55" stop-color="#e8bd64"/>
      <stop offset="1" stop-color="#b8742d" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="18"/></filter>
    <pattern id="mural" width="220" height="220" patternUnits="userSpaceOnUse" patternTransform="rotate(-8)">
      <rect width="220" height="220" fill="#9b3e26"/>
      <path d="M0 180L80 0h70L70 220H0z" fill="#d59a3a"/>
      <circle cx="175" cy="55" r="42" fill="#1f6d62"/>
      <path d="M120 220l100-95v95z" fill="#f0cf86"/>
    </pattern>
  </defs>
  <rect width="1600" height="1000" fill="url(#sky)"/>
  <circle cx="1160" cy="235" r="190" fill="url(#moon)" filter="url(#glow)" opacity="0.55"/>
  <circle cx="1160" cy="235" r="92" fill="#f4d98f" opacity="0.9"/>
