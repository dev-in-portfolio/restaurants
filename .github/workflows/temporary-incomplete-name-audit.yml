name: Temporary incomplete name audit

on:
  pull_request:
    paths:
      - '.github/workflows/temporary-incomplete-name-audit.yml'

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Resolve incomplete portal entries
        run: |
          node <<'NODE'
          const fs = require('fs');
          const vm = require('vm');
          const normalizeName = (name = '') => name.normalize('NFKD').replace(/[\u0300-\u036f]/g, '').toLowerCase().replace(/&/g, 'and').replace(/[^a-z0-9]+/g, '').replace(/^(the|an|a)/, '').replace(/(restaurant|cafe|company|co)$/, '');
          const cleanText = (value = '') => String(value).replace(/([A-Za-z])�s\b/g, '$1’s').replace(/\s�\s/g, ' • ').replace(/�/g, '').replace(/\s{2,}/g, ' ').trim();
          function parseLegacy(sourceText) {
            const marker = 'const concepts = [';
            const start = sourceText.indexOf(marker);
            const end = sourceText.indexOf('\n    ];', start);
            const items = [];
            for (const raw of sourceText.slice(start + marker.length, end).split(/\r?\n/)) {
              let line = raw.trim();
              if (!line.startsWith('{name:')) continue;
              line = line.replace(/,$/, '');
              try { items.push(Function(`"use strict"; return (${line});`)()); } catch {}
            }
            return items;
          }
          const sandbox = { window: {} };
          vm.createContext(sandbox);
          vm.runInContext(fs.readFileSync('portal-overrides.js', 'utf8'), sandbox);
          const groups = [
            { type: 'legacy', items: parseLegacy(fs.readFileSync('portal-concepts-source.html', 'utf8')) },
            { type: 'override', items: sandbox.window.portalOverrides || [] }
          ];
          const priority = { lead: 0, incomplete: 1, qa: 2, premium: 3, promoted_secondary: 4, promoted: 5 };
          const byName = new Map();
          for (const group of groups) for (const item of group.items) {
            const isLead = item.status === 'lead' || group.type === 'lead';
            const allowed = group.type === 'override' && ['lead','incomplete','qa','premium','promoted','promoted_secondary'].includes(item.status);
            const normalized = { ...item, name: cleanText(item.name || 'Unnamed restaurant'), status: allowed ? item.status : (isLead ? 'lead' : 'incomplete') };
            const key = normalizeName(normalized.name);
            const current = byName.get(key);
            if (key && (!current || priority[normalized.status] >= priority[current.status])) byName.set(key, normalized);
          }
          const incomplete = [...byName.values()].filter(x => x.status === 'incomplete').sort((a,b) => a.name.localeCompare(b.name)).map(({name,href,area,cuisine}) => ({name,href,area,cuisine}));
          fs.writeFileSync('incomplete-portal-entries.json', JSON.stringify({count: incomplete.length, incomplete}, null, 2));
          console.log('INCOMPLETE_COUNT=' + incomplete.length);
          NODE
      - uses: actions/upload-artifact@v4
        with:
          name: incomplete-portal-entries
          path: incomplete-portal-entries.json
