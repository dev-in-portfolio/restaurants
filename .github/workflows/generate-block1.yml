name: Finalize Block 1 restaurant demos

on:
  push:
    branches:
      - agent/block-1-boudreauxs
    paths:
      - scripts/finalize_block1.py
      - .github/workflows/generate-block1.yml
  pull_request:
    branches:
      - main
    paths:
      - scripts/finalize_block1.py
      - .github/workflows/generate-block1.yml
      - boudreauxs/**
  workflow_dispatch:

permissions:
  contents: write

jobs:
  validate-and-finalize:
    runs-on: ubuntu-latest
    steps:
      - name: Check out Block 1 branch
        uses: actions/checkout@v4
        with:
          ref: agent/block-1-boudreauxs
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Validate all 20 Block 1 demos
        run: python scripts/finalize_block1.py

      - name: Check whitespace
        run: git diff --check

      - name: Commit Block 1 status and portfolio updates
        shell: bash
        run: |
          if git diff --quiet; then
            echo "Block 1 already finalized."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html BLOCK1_STATUS.md
          git commit -m "Finalize all Block 1 restaurant demos [skip ci]"
          git push origin HEAD:agent/block-1-boudreauxs
