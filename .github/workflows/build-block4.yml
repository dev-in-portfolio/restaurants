name: Build Block 4 restaurant demos

on:
  pull_request:
    types: [opened, reopened, synchronize]

permissions:
  contents: write

concurrency:
  group: build-block4
  cancel-in-progress: false

jobs:
  build:
    if: github.event.pull_request.title == 'Run Block 4 restaurant build'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Reconstruct checksum-verified Block 4 generator
        shell: bash
        run: |
          cat .migration/block4/bundle.part00 .migration/block4/bundle.part01 > /tmp/block4.b64
          cat .migration/block4/bundle.part02a.hex .migration/block4/bundle.part02b.hex | tr -d '\n' | xxd -r -p >> /tmp/block4.b64
          cat .migration/block4/bundle.part03a.hex .migration/block4/bundle.part03b.hex | tr -d '\n' | xxd -r -p >> /tmp/block4.b64
          base64 -d /tmp/block4.b64 > /tmp/block4gen.tar.gz
          echo 'cd6dd1fa60b1058886e0978946db44d586aa022a94b355e89cd6666f21a86310  /tmp/block4gen.tar.gz' | sha256sum -c -
          tar -xzf /tmp/block4gen.tar.gz

      - name: Generate and validate all Block 4 sites
        shell: bash
        run: python .migration/block4/build.py

      - name: Remove temporary migration files
        shell: bash
        run: |
          rm -rf .migration/block4
          rm -f .github/workflows/build-block4.yml

      - name: Commit generated restaurant sites
        shell: bash
        run: |
          git config user.name 'restaurant-demo-bot'
          git config user.email 'actions@users.noreply.github.com'
          git add -A
          git diff --cached --quiet && exit 0
          git commit -m 'Build Block 4 full five-page restaurant demos [skip ci]'
          git push origin main
