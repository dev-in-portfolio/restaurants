name: Boudreaux's visual QA

on:
  pull_request:
    paths:
      - 'boudreauxs/**'
      - 'scripts/qa-boudreauxs.mjs'
      - '.github/workflows/boudreauxs-visual-qa.yml'

jobs:
  browser-qa:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install Playwright
        run: |
          npm init -y >/dev/null 2>&1
          npm install --no-save playwright@1.55.0
          npx playwright install --with-deps chromium
      - name: Check JavaScript syntax
        run: node --check boudreauxs/app.js
      - name: Serve site
        run: |
          python3 -m http.server 4173 >/tmp/boudreauxs-server.log 2>&1 &
          sleep 2
      - name: Render desktop and mobile pages
        run: node scripts/qa-boudreauxs.mjs
      - name: Upload visual review set
        uses: actions/upload-artifact@v4
        with:
          name: boudreauxs-visual-qa
          path: qa-artifacts/boudreauxs/*.png
          if-no-files-found: error
          retention-days: 7
