name: Publish Boudreaux's portal card

on:
  pull_request:
    types: [synchronize]

permissions:
  contents: write

jobs:
  publish:
    if: github.event.pull_request.number == 12
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: rebuild/from-clean-sop
          fetch-depth: 0
      - name: Add reviewed premium card to portal
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('index.html')
          text = path.read_text(encoding='utf-8')

          old_notice = '<div class="concept-notice"><strong>Honest status:</strong> FULL cards contain five substantive pages and are published, but remain premium-QA pending. PROTOTYPE cards contain one page and are incomplete.</div>'
          new_notice = '<div class="concept-notice"><strong>Status guide:</strong> PREMIUM cards are individually designed and browser-reviewed on desktop and mobile. FULL cards contain five substantive pages but still await premium review. PROTOTYPE cards contain one page and are incomplete.</div>'
          if old_notice in text:
              text = text.replace(old_notice, new_notice)

          old_style = '.full-card{outline:1px solid rgba(245,190,92,.36);box-shadow:0 18px 55px rgba(0,0,0,.25)}.prototype-card{opacity:.82}'
          new_style = '.premium-card{outline:1px solid rgba(240,184,92,.68);box-shadow:0 22px 65px rgba(0,0,0,.34)}\n    .full-card{outline:1px solid rgba(245,190,92,.36);box-shadow:0 18px 55px rgba(0,0,0,.25)}.prototype-card{opacity:.82}'
          if old_style in text:
              text = text.replace(old_style, new_style)

          old_badges = '.full-card .card-rating-badge{background:linear-gradient(135deg,#f0b85c,#d97a42);color:#17100a}.prototype-card .card-rating-badge{background:#334155;color:#e2e8f0}'
          new_badges = '.premium-card .card-rating-badge{background:linear-gradient(135deg,#f5d47d,#d98242);color:#17100a}\n    .full-card .card-rating-badge{background:linear-gradient(135deg,#f0b85c,#d97a42);color:#17100a}.prototype-card .card-rating-badge{background:#334155;color:#e2e8f0}'
          if old_badges in text:
              text = text.replace(old_badges, new_badges)

          href = 'boudreauxs/index.html'
          if href not in text:
              marker = '    const concepts = [\n'
              card = '      {name:"Boudreaux’s Louisiana Kitchen",area:"Charlotte · NoDa",cuisine:"Louisiana Kitchen • Neighborhood Dining",description:"A custom bayou-meets-NoDa identity with original artwork, a Louisiana flavor guide, gathering planner and polished five-page customer journey.",emoji:"⚜️",href:"boudreauxs/index.html",gradient:"linear-gradient(135deg,#071713,#1f6d62 52%,#a7432b)",status:"premium"},\n'
              if marker not in text:
                  raise SystemExit('Portal concepts array not found')
              text = text.replace(marker, marker + card, 1)

          old_render = "grid.innerHTML=concepts.map(item=>{const full=item.status==='full';return `<article class=\"portal-card glass-panel ${full?'full-card':'prototype-card'}\"><div class=\"card-image-wrapper\"><span class=\"card-rating-badge\">${full?'FULL 5-PAGE • QA PENDING':'1-PAGE • INCOMPLETE'}</span><div class=\"card-img-placeholder\" style=\"background:${item.gradient}\">${item.emoji}</div></div><div class=\"card-content\"><span class=\"card-cuisine\">${item.cuisine}</span><h2 class=\"card-title\">${item.name}</h2><p class=\"card-description\">${item.description}</p><div class=\"card-footer\"><span class=\"card-price\">Area: <span>${item.area}</span></span><a href=\"${item.href}\" class=\"visit-btn\">${full?'View Full Demo':'View Incomplete Prototype'} ➔</a></div></div></article>`}).join('');"
          new_render = "grid.innerHTML=concepts.map(item=>{const premium=item.status==='premium';const full=premium||item.status==='full';const badge=premium?'PREMIUM • REVIEWED':full?'FULL 5-PAGE • QA PENDING':'1-PAGE • INCOMPLETE';const label=premium?'View Premium Demo':full?'View Full Demo':'View Incomplete Prototype';return `<article class=\"portal-card glass-panel ${premium?'premium-card':full?'full-card':'prototype-card'}\"><div class=\"card-image-wrapper\"><span class=\"card-rating-badge\">${badge}</span><div class=\"card-img-placeholder\" style=\"background:${item.gradient}\">${item.emoji}</div></div><div class=\"card-content\"><span class=\"card-cuisine\">${item.cuisine}</span><h2 class=\"card-title\">${item.name}</h2><p class=\"card-description\">${item.description}</p><div class=\"card-footer\"><span class=\"card-price\">Area: <span>${item.area}</span></span><a href=\"${item.href}\" class=\"visit-btn\">${label} ➔</a></div></div></article>`}).join('');"
          if old_render in text:
              text = text.replace(old_render, new_render)
          elif 'PREMIUM • REVIEWED' not in text:
              raise SystemExit('Portal renderer did not match expected clean baseline')

          path.write_text(text, encoding='utf-8')
          PY
          rm .github/workflows/publish-boudreauxs-portal.yml
          git diff --check
          git config user.name 'restaurant-demo-bot'
          git config user.email 'actions@users.noreply.github.com'
          git add index.html .github/workflows/publish-boudreauxs-portal.yml
          git commit -m "Add reviewed Boudreaux's portal card"
          git push origin HEAD:rebuild/from-clean-sop
