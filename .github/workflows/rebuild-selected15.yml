name: Rebuild selected 15 restaurant demos
on:
  push:
    branches: [main]
    paths: ['.github/workflows/rebuild-selected15.yml']
permissions:
  contents: write
concurrency:
  group: rebuild-selected15
  cancel-in-progress: false
jobs:
  rebuild:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Generate bespoke restaurant sites
        shell: bash
        run: |
          mkdir -p scripts
          printf '%s' '[... truncated for brevity ...]' | base64 -d | gunzip > scripts/rebuild_selected15.py
          python scripts/rebuild_selected15.py
          for file in carolina-scoops/site.js waldhorn-restaurant/site.js seaboard-brewing/site.js loyalist-market/site.js matthews-social-house/site.js picadelis-pub-in-deli/site.js kabab-je/site.js mj-donuts/site.js aj-family-restaurant/site.js umami-sushi-grill/site.js cornerstone-pub-grill/site.js open-kitchen/site.js dish/site.js les-sandwiches-cafe/site.js portofinos/site.js; do node --check "$file"; done
      - name: Commit complete rebuild
        shell: bash
        run: |
          rm -f scripts/rebuild_selected15.py .github/workflows/rebuild-selected15.yml
          git config user.name 'restaurant-demo-bot'
          git config user.email 'actions@users.noreply.github.com'
          git add -A
          git diff --cached --quiet && exit 0
          git commit -m 'Rebuild selected 15 restaurant demos [skip ci]'
          git push
