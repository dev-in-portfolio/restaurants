name: Build Block 2 restaurant demos

on:
  pull_request:
    types: [opened, reopened, synchronize]

permissions:
  contents: write

jobs:
  build:
    if: github.event.pull_request.number == 11
    runs-on: ubuntu-latest
    steps:
      - name: Check out Block 2 branch
        uses: actions/checkout@v4
        with:
          ref: agent/block-2-complete
          fetch-depth: 0

      - name: Reconstruct and verify generator
        shell: bash
        run: |
          cat .migration/block2hex/part00 \
              .migration/block2hex/part01 \
              .migration/block2hex/part02 \
              .migration/block2hex/part03a \
              .migration/block2hex/part03b \
              .migration/block2hex/part04a \
              .migration/block2hex/part04b > /tmp/block2.hex
          mkdir -p scripts
          python - <<'PY'
          from pathlib import Path
          import hashlib
          raw = Path('/tmp/block2.hex').read_text(encoding='utf-8').strip()
          data = bytes.fromhex(raw)
          expected = '6c3da76b820a8c65f93bc09dfee4671182d207b690e4fc99eb9dfebb35c85c5b'
          actual = hashlib.sha256(data).hexdigest()
          if actual != expected:
              raise SystemExit(f'Generator checksum mismatch: {actual}')
          Path('scripts/build_block2.py').write_bytes(data)
          PY
          python -m py_compile scripts/build_block2.py

      - name: Generate and validate Block 2
        run: python scripts/build_block2.py

      - name: Remove migration payload and temporary generator
        run: |
          rm -rf .migration/block2 .migration/block2hex
          rm -f scripts/build_block2.py

      - name: Check whitespace
        run: git diff --check

      - name: Commit generated demos
        shell: bash
        run: |
          git config user.name 'restaurant-demo-bot'
          git config user.email 'actions@users.noreply.github.com'
          git add -A
          git diff --cached --quiet && exit 0
          git commit -m 'Build Block 2 full five-page restaurant demos [skip ci]'
          git push origin HEAD:agent/block-2-complete
