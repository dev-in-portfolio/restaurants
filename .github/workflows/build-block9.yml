name: Build Block 9 restaurant demos

on:
  pull_request:
    types: [opened, reopened, synchronize]

permissions:
  contents: write

concurrency:
  group: build-block9
  cancel-in-progress: false

jobs:
  build:
    if: github.event.pull_request.title == 'Run Block 9 restaurant build'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Reconstruct checksum-verified Block 9 generator
        shell: bash
        run: |
          cat .migration/block9hex/part00 .migration/block9hex/part01 .migration/block9hex/part02 .migration/block9hex/part03 > /tmp/block9.hex
          python - <<'PY'
          from pathlib import Path
          payload = Path('/tmp/block9.hex').read_text(encoding='utf-8').strip()
          Path('/tmp/block9.py.gz').write_bytes(bytes.fromhex(payload))
          PY
          echo '7d19481a88932440bf075ff70a70119813ccfd34ec401176f7b6717967011c0e  /tmp/block9.py.gz' | sha256sum -c -
          mkdir -p .migration/block9
          gzip -dc /tmp/block9.py.gz > .migration/block9/build.py
          python -m py_compile .migration/block9/build.py

      - name: Generate and validate Block 9
        run: python .migration/block9/build.py

      - name: Remove temporary migration files
        run: |
          rm -rf .migration/block9 .migration/block9hex
          rm -f .github/workflows/build-block9.yml

      - name: Commit generated restaurant sites
        shell: bash
        run: |
          git config user.name 'restaurant-demo-bot'
          git config user.email 'actions@users.noreply.github.com'
          git add -A
          git diff --cached --quiet && exit 0
          git commit -m 'Build Block 9 full five-page restaurant demos [skip ci]'
          git push origin main
