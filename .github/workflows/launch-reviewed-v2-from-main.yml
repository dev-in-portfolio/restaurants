name: Launch reviewed restaurant upgrades v2 from main

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/launch-reviewed-v2-from-main.yml

permissions:
  contents: write

concurrency:
  group: launch-reviewed-restaurant-upgrades-v2-from-main
  cancel-in-progress: false

jobs:
  launch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/continue-restaurant-upgrades-v2
          fetch-depth: 0

      - name: Fetch validated base generator branch
        run: git fetch origin agent/continue-restaurant-upgrades

      - name: Run explicit reviewed target list
        run: python scripts/continue_six_page_upgrades_v2.py

      - name: Push only the clean v2 branch
        run: git push origin HEAD:agent/continue-restaurant-upgrades-v2

      - name: Remove temporary launcher from main
        shell: bash
        run: |
          git fetch origin main
          git switch --force-create main origin/main
          git config user.name 'restaurant-upgrade-bot'
          git config user.email 'actions@users.noreply.github.com'
          git rm .github/workflows/launch-reviewed-v2-from-main.yml
          git commit -m 'Remove temporary reviewed-upgrade launcher'
          git push origin main
