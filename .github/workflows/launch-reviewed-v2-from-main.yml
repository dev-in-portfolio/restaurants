name: Launch reviewed restaurant upgrades v2 from PR

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize

permissions:
  contents: write
  pull-requests: read

concurrency:
  group: launch-reviewed-restaurant-upgrades-v2-from-pr
  cancel-in-progress: false

jobs:
  launch:
    if: github.head_ref == 'agent/continue-restaurant-upgrades-v2' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/continue-restaurant-upgrades-v2
          fetch-depth: 0

      - name: Fetch validated base generator branch
        run: git fetch origin agent/continue-restaurant-upgrades

      - name: Run explicit reviewed target list
        run: python scripts/continue_six_page_upgrades_v2.py

      - name: Push only the clean v2 branch
        run: git push origin HEAD:agent/continue-restaurant-upgrades-v2
