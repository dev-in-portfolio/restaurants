name: Launch reviewed restaurant upgrades v2

on:
  push:
    branches:
      - agent/continue-restaurant-upgrades
    paths:
      - .github/workflows/launch-reviewed-v2.yml

permissions:
  contents: write

concurrency:
  group: launch-reviewed-restaurant-upgrades-v2
  cancel-in-progress: false

jobs:
  launch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/continue-restaurant-upgrades-v2
          fetch-depth: 0

      - name: Fetch validated base generator branch
        run: git fetch origin agent/continue-restaurant-upgrades

      - name: Run explicit reviewed target list
        run: python scripts/continue_six_page_upgrades_v2.py

      - name: Push only the clean v2 branch
        run: git push origin HEAD:agent/continue-restaurant-upgrades-v2
