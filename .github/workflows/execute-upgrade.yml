name: Execute restaurant upgrade
on:
  push:
    branches: [main]
permissions:
  contents: write
jobs:
  execute:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Extract and run migration
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import base64, gzip, re
          source = Path('.github/workflows/upgrade-latest-15.yml').read_text(encoding='utf-8')
          match = re.search(r"echo '([^']+)' \| base64", source)
          if not match:
              raise SystemExit('Embedded migration payload not found')
          Path('scripts').mkdir(exist_ok=True)
          Path('scripts/upgrade_restaurants.py').write_bytes(gzip.decompress(base64.b64decode(match.group(1))))
          PY
          python scripts/upgrade_restaurants.py
          rm -f .github/workflows/execute-upgrade.yml
      - name: Commit generated sites
        shell: bash
        run: |
          git config user.name 'restaurant-demo-bot'
          git config user.email 'actions@users.noreply.github.com'
          git add -A
          git diff --cached --quiet && exit 0
          git commit -m 'Complete latest 15 five-page demos [skip ci]'
          git push
