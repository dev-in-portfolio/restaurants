name: Build next 20 restaurant demos

on:
  pull_request:
    types: [opened, reopened, synchronize]

permissions:
  contents: write

concurrency:
  group: build-next20
  cancel-in-progress: false

jobs:
  build:
    if: github.event.pull_request.title == 'Run next 20 restaurant build'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Reconstruct verified restaurant package
        shell: bash
        run: |
          cat \
            .migration/next20hex/part00 \
            .migration/next20hex/part01 \
            .migration/next20hex/part02 \
            .migration/next20hex/part03 \
            .migration/next20hex/part04_05 \
            .migration/next20hex/part06 \
            .migration/next20hex/part07 \
            .migration/next20hex/part08 > /tmp/next20.hex
          python - <<'PY'
          from pathlib import Path
          payload = Path('/tmp/next20.hex').read_text(encoding='utf-8').strip()
          Path('/tmp/next20.tar.gz').write_bytes(bytes.fromhex(payload))
          PY
          echo '01bd8d3a2de6da7bfa71c7361ecc6f647e566cfb9c642036a932871f77928228  /tmp/next20.tar.gz' | sha256sum -c -
          tar -xzf /tmp/next20.tar.gz

      - name: Validate all 20 five-page sites
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import re
          import subprocess
          import sys

          slugs = [
              'napoli-italian-restaurant',
              'knife-fork-restaurant',
              'little-village-grill',
              'mama-gees',
              'rice-spice-thai',
              'bes-noodles-banh-mi',
              'zeitouni-mediterranean-grill',
              'stumptown-station',
              'fenwicks-restaurant',
              'park-place-restaurant',
              'carolina-family-restaurant',
              'pressley-park-restaurant',
              'greystone-pub',
              'nikos-grill',
              'hinsons-drive-in',
              'original-chicken-n-ribs',
              'sub-one-hoagie-house',
              'anntonys-caribbean-cafe',
              'skyland-family-restaurant',
              'landmark-restaurant-diner',
          ]

          errors = []
          total_pages = 0
          for slug in slugs:
              folder = Path(slug)
              html_pages = sorted(folder.glob('*.html'))
              total_pages += len(html_pages)
              if len(html_pages) != 5:
                  errors.append(f'{slug}: expected 5 HTML pages, found {len(html_pages)}')
              for required in ('site.css', 'site.js', 'evidence.md'):
                  if not (folder / required).is_file():
                      errors.append(f'{slug}: missing {required}')
              for page in html_pages:
                  text = page.read_text(encoding='utf-8')
                  if '<nav' not in text or '<main' not in text or '<footer' not in text:
                      errors.append(f'{page}: missing required page structure')
                  if 'Concept only' not in text and 'Unofficial' not in text:
                      errors.append(f'{page}: missing demo disclosure')
                  for href in re.findall(r'href=["\']([^"\']+)', text):
                      if href.startswith(('http:', 'https:', 'mailto:', 'tel:', '#')):
                          continue
                      clean = href.split('#', 1)[0]
                      if clean and not (page.parent / clean).exists():
                          errors.append(f'{page}: broken internal link {href}')
              js_check = subprocess.run(['node', '--check', str(folder / 'site.js')], capture_output=True, text=True)
              if js_check.returncode:
                  errors.append(f'{slug}: JavaScript syntax failure: {js_check.stderr.strip()}')

          root = Path('index.html').read_text(encoding='utf-8')
          if root.count('"status": "static"') != 20:
              errors.append('portfolio must contain exactly 20 new STATIC QA cards')
          if 'FULL 5-PAGE • STATIC QA' not in root:
              errors.append('portfolio STATIC QA label missing')
          if 'BROWSER QA' in root or 'PREMIUM' in root.replace('No card is labeled PREMIUM', ''):
              errors.append('unsupported browser or premium claim found in portfolio')
          if total_pages != 100:
              errors.append(f'expected 100 restaurant pages, found {total_pages}')
          if errors:
              print('\n'.join(errors))
              sys.exit(1)
          print('Validated 20 restaurants, 100 HTML pages, all links and JavaScript checks passed.')
          PY

      - name: Remove temporary migration files
        shell: bash
        run: |
          rm -rf .migration/next20 .migration/next20hex
          rm -f .staging-do-not-use.txt
          rm -f .github/workflows/build-next20.yml

      - name: Commit generated restaurant sites
        shell: bash
        run: |
          git config user.name 'restaurant-demo-bot'
          git config user.email 'actions@users.noreply.github.com'
          git add -A
          git diff --cached --quiet && exit 0
          git commit -m 'Build next 20 full five-page restaurant demos [skip ci]'
          git push origin main
