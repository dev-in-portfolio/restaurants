name: Build Block 6 restaurant demos

on:
  pull_request:
    types: [opened, reopened, synchronize]

permissions:
  contents: write

concurrency:
  group: build-block6
  cancel-in-progress: false

jobs:
  build:
    if: github.event.pull_request.title == 'Run Block 6 restaurant build'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Recover validated generator and reconstruct Block 6 data
        shell: bash
        run: |
          for part in part00 part01 part02a part02b part03 part04 part05; do
            git show a81ed2cc237a9305e7a53e66c79b23e3d526d8ed:.migration/block5hex/$part
          done > /tmp/block5.hex
          python - <<'PY'
          from pathlib import Path
          payload = Path('/tmp/block5.hex').read_text(encoding='utf-8').strip()
          Path('/tmp/block5.tar.gz').write_bytes(bytes.fromhex(payload))
          PY
          echo '99f2b1db68df0b28684f719304ffa1fb61c9bef39b069f5b19b16bdbc99198bc  /tmp/block5.tar.gz' | sha256sum -c -
          mkdir -p /tmp/block5gen
          tar -xzf /tmp/block5.tar.gz -C /tmp/block5gen
          mkdir -p .migration/block6
          sed -e 's/\.migration\/block5/\.migration\/block6/g' -e 's/BLOCK 5/BLOCK 6/g' -e 's/Block 5/Block 6/g' -e 's/block5/block6/g' /tmp/block5gen/.migration/block5/build.py > .migration/block6/build.py

          cat .migration/block6data/data00 .migration/block6data/data01 .migration/block6data/data02 .migration/block6data/data03 .migration/block6data/data04 .migration/block6data/data05 > /tmp/block6data.hex
          python - <<'PY'
          from pathlib import Path
          payload = Path('/tmp/block6data.hex').read_text(encoding='utf-8').strip()
          Path('/tmp/block6data.tar.gz').write_bytes(bytes.fromhex(payload))
          PY
          echo 'dc82e8df46615a0b7c66c875da1f8bd8a797b38a3f62a5f29f22f20f376ff9c6  /tmp/block6data.tar.gz' | sha256sum -c -
          tar -xzf /tmp/block6data.tar.gz

      - name: Generate and validate Block 6
        run: python .migration/block6/build.py

      - name: Remove temporary migration files
        run: |
          rm -rf .migration/block6 .migration/block6data .migration/block6hex
          rm -f .github/workflows/build-block6.yml

      - name: Commit generated restaurant sites
        shell: bash
        run: |
          git config user.name 'restaurant-demo-bot'
          git config user.email 'actions@users.noreply.github.com'
          git add -A
          git diff --cached --quiet && exit 0
          git commit -m 'Build Block 6 full five-page restaurant demos [skip ci]'
          git push origin main
