name: Temporary Phase 2 repair 41

on:
  pull_request:

permissions:
  contents: write

jobs:
  repair:
    runs-on: ubuntu-latest
    steps:
      - name: Check out controller branch
        uses: actions/checkout@v4
        with:
          path: controller

      - name: Check out latest restaurants main
        uses: actions/checkout@v4
        with:
          repository: dev-in-portfolio/restaurants
          ref: main
          fetch-depth: 0
          path: work

      - name: Set up runtimes
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Scope semantic validation to requested groups
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path
          repair = Path('controller/.github/scripts/phase2-repair.py')
          text = repair.read_text(encoding='utf-8')
          text = text.replace("'main':['MISSING']", "'main':['*']")
          old = """        if main_open != 1 or main_close != 1:\n            issues.append(f'{rel}: expected one main, found {main_open}/{main_close}')\n        elif not re.search(r'<main\\b[^>]*\\bid=[\"\\\']main[\"\\\']', raw, flags=re.I):\n            issues.append(f'{rel}: main is missing id=\"main\"')"""
          new = """        if main_open != 1 or main_close != 1:\n            issues.append(f'{rel}: expected one main, found {main_open}/{main_close}')\n        elif (target['group'] in {'B','C'} or rel in expansion_files) and not re.search(r'<main\\b[^>]*\\bid=[\"\\\']main[\"\\\']', raw, flags=re.I):\n            issues.append(f'{rel}: main is missing id=\"main\"')"""
          if old not in text:
              raise SystemExit('Static semantic validation block was not found.')
          repair.write_text(text.replace(old, new), encoding='utf-8')

          browser = Path('controller/.github/scripts/phase2-browser-qa.js')
          text = browser.read_text(encoding='utf-8')
          text = text.replace('async function inspectPage(page, url, label, viewportName) {', 'async function inspectPage(page, url, label, viewportName, currentGroup) {')
          text = text.replace(
              "  if (checks.mainCount !== 1 || checks.mainIdCount !== 1) failures.push(`${label}: expected exactly one main#main, found main=${checks.mainCount}, main#main=${checks.mainIdCount}`);",
              "  if (checks.mainCount !== 1) failures.push(`${label}: expected exactly one main element, found ${checks.mainCount}`);\n  if (checks.mainIdCount !== 1 && ['B', 'C'].includes(currentGroup)) failures.push(`${label}: semantic-fix build expected main#main, found ${checks.mainIdCount}`);"
          )
          text = text.replace('const result = await inspectPage(page, url, relSite, viewport.name);', 'const result = await inspectPage(page, url, relSite, viewport.name, target.group);')
          browser.write_text(text, encoding='utf-8')
          PY
          python3 -m py_compile controller/.github/scripts/phase2-repair.py
          node --check controller/.github/scripts/phase2-browser-qa.js

      - name: Repair and statically validate 41 builds
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p out
          WORK_ROOT="$GITHUB_WORKSPACE/work" OUT_DIR="$GITHUB_WORKSPACE/out" \
            python3 controller/.github/scripts/phase2-repair.py 2>&1 | tee out/phase2-static.log

      - name: Repair responsive runtime and duplicate-id defects
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json
          import re
          import subprocess
          from pathlib import Path

          root = Path('work')
          report_path = Path('out/phase2-static-report.json')
          report = json.loads(report_path.read_text(encoding='utf-8'))
          responsive = '''\n<style data-phase2-responsive>\nhtml,body{max-width:100%;overflow-x:clip}*,*::before,*::after{box-sizing:border-box}img,svg,video,canvas,iframe{max-width:100%;height:auto}table{max-width:100%}\n@media(max-width:600px){body>*{max-width:100%}nav,.nav,[class*="nav"]{max-width:100%;height:auto!important;min-height:0;flex-wrap:wrap!important}.nav-links,[class*="nav-links"],[class*="links"]{max-width:100%;min-width:0;flex-wrap:wrap!important;gap:.5rem!important}main,header,footer,section,form,[class*="container"],[class*="wrapper"],[class*="grid"]{max-width:100%;min-width:0}input,select,textarea,button{max-width:100%}}\n</style>\n'''
          changed = set(report['changedFiles'])

          for target in report['targets']:
              if target['group'] not in {'B', 'C'}:
                  continue
              site = root / target['path']
              for file in site.rglob('*.html'):
                  text = file.read_text(encoding='utf-8')
                  original = text
                  legacy_counter = [0]
                  tag_pattern = re.compile(r'<([A-Za-z][\w:-]*)([^>]*\bid=["\']main["\'][^>]*)>', re.I)
                  def replace_legacy(match):
                      if match.group(1).lower() == 'main':
                          return match.group(0)
                      legacy_counter[0] += 1
                      return re.sub(r'\bid=["\']main["\']', f'id="phase2-legacy-main-{legacy_counter[0]}"', match.group(0), count=1, flags=re.I)
                  text = tag_pattern.sub(replace_legacy, text)
                  if 'data-phase2-responsive' not in text:
                      if re.search(r'</head\s*>', text, flags=re.I):
                          text = re.sub(r'</head\s*>', responsive + '</head>', text, count=1, flags=re.I)
                      else:
                          raise SystemExit(f'{file}: missing closing head for responsive repair')
                  if text != original:
                      file.write_text(text, encoding='utf-8')
                      changed.add(file.relative_to(root).as_posix())

          dom = root / 'doms-dive-bar' / 'specials.html'
          text = dom.read_text(encoding='utf-8')
          fixed = text.replace("whatever's new on tap", "whatever\\'s new on tap")
          if fixed == text:
              raise SystemExit('Dom specials JavaScript apostrophe defect was not found.')
          dom.write_text(fixed, encoding='utf-8')
          changed.add(dom.relative_to(root).as_posix())

          report['changedFiles'] = sorted(changed)
          report['changedFileCount'] = len(report['changedFiles'])
          report['browserDefectRepairs'] = {
              'responsiveContainmentAppliedToGroups': ['B','C'],
              'duplicateLegacyMainIdsRenamed': True,
              'domsDiveBarSpecialsJavaScriptFixed': True,
          }
          report_path.write_text(json.dumps(report, indent=2, ensure_ascii=False) + '\n', encoding='utf-8')

          expected = report['changedFiles']
          actual = sorted(subprocess.check_output(['git','-C','work','diff','--name-only'], text=True).splitlines())
          if actual != expected:
              raise SystemExit(f'Changed-file safety mismatch. expected={expected} actual={actual}')
          print(f'Changed-file safety check passed for {len(actual)} files.')
          PY

      - name: Install browser QA runtime
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p /tmp/phase2-qa
          cd /tmp/phase2-qa
          npm init -y >/dev/null
          npm install --no-audit --no-fund playwright@1.55.0 >/dev/null
          npx playwright install --with-deps chromium >/dev/null

      - name: Run desktop tablet and mobile QA
        shell: bash
        run: |
          set -euo pipefail
          python3 -m http.server 4173 --directory work >/tmp/phase2-server.log 2>&1 &
          SERVER_PID=$!
          trap 'kill $SERVER_PID 2>/dev/null || true' EXIT
          sleep 2
          NODE_PATH=/tmp/phase2-qa/node_modules WORK_ROOT="$GITHUB_WORKSPACE/work" OUT_DIR="$GITHUB_WORKSPACE/out" BASE_URL=http://127.0.0.1:4173 \
            node controller/.github/scripts/phase2-browser-qa.js 2>&1 | tee out/phase2-browser.log

      - name: Run available repository tests
        shell: bash
        working-directory: work
        run: |
          set -euo pipefail
          if [ -f package.json ]; then
            npm install --ignore-scripts --no-audit --no-fund
            npm test --if-present
            npm run validate --if-present
            npm run validate:all --if-present
          else
            echo 'No package.json; static and browser QA are the repository validation.'
          fi

      - name: Commit and push repairs to main
        shell: bash
        working-directory: work
        run: |
          set -euo pipefail
          git config user.name 'OpenAI'
          git config user.email 'noreply@openai.com'
          git add -A
          if git diff --cached --quiet; then
            echo 'No Phase 2 changes were needed.' | tee ../out/commit.txt
            exit 0
          fi
          git commit -m 'Repair 41 promoted restaurant builds for pitch readiness'
          git fetch origin main
          git rebase origin/main
          WORK_ROOT="$GITHUB_WORKSPACE/work" OUT_DIR="$GITHUB_WORKSPACE/out-recheck" \
            python3 ../controller/.github/scripts/phase2-repair.py --validate-only
          git push origin HEAD:main
          git rev-parse HEAD | tee ../out/commit.txt

      - name: Upload Phase 2 report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phase2-repair-41-report
          path: out
