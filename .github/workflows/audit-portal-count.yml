name: Audit portal count

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  count:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Count portal restaurants
        shell: bash
        run: |
          node <<'NODE'
          const fs=require('fs'),vm=require('vm');
          const normalizeName=(name='')=>name.normalize('NFKD').replace(/[\u0300-\u036f]/g,'').toLowerCase().replace(/&/g,'and').replace(/[^a-z0-9]+/g,'').replace(/^(the|an|a)/,'').replace(/(restaurant|cafe|company|co)$/,'');
          function parseLegacy(t){const sm='const concepts = [';const s=t.indexOf(sm);const e=t.indexOf('\n    ];',s);if(s<0||e<0)throw new Error('legacy block missing');let items=[],errors=0;for(const raw of t.slice(s+sm.length,e).split(/\r?\n/)){let line=raw.trim();if(!line.startsWith('{name:'))continue;line=line.replace(/,$/,'');try{items.push(vm.runInNewContext(`(${line})`));}catch{errors++;}}return{items,errors};}
          function load(f,p){const c={window:{}};vm.createContext(c);vm.runInContext(fs.readFileSync(f,'utf8'),c,{filename:f});return Array.from(c.window[p]||[])}
          const legacy=parseLegacy(fs.readFileSync('portal-concepts-source.html','utf8'));
          const m2=load('portal-leads-message2-original.js','restaurantLeadsMessage2');
          const m3=load('portal-leads-message3.js','restaurantLeadsMessage3');
          const ov=load('portal-overrides.js','portalOverrides');
          const pri={lead:0,incomplete:1,qa:2,premium:3},by=new Map();
          for(const [type,items] of [['legacy',legacy.items],['lead',m2],['lead',m3],['override',ov]])for(const item of items){const isLead=item.status==='lead'||type==='lead';const allowed=type==='override'&&['lead','incomplete','qa','premium'].includes(item.status);const status=allowed?item.status:(isLead?'lead':'incomplete');const key=normalizeName(String(item.name||''));if(!key)continue;const cur=by.get(key);if(!cur||pri[status]>=pri[cur.status])by.set(key,{...item,status});}
          const counts={};for(const x of by.values())counts[x.status]=(counts[x.status]||0)+1;
          console.log('PORTAL_COUNT_RESULT='+JSON.stringify({total:by.size,counts,source:{legacy:legacy.items.length,message2:m2.length,message3:m3.length,overrides:ov.length},legacyParseErrors:legacy.errors}));
          NODE
