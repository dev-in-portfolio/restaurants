name: Build Block 5 restaurant demos

on:
  pull_request:
    types: [opened, reopened, synchronize]

permissions:
  contents: write

concurrency:
  group: build-block5
  cancel-in-progress: false

jobs:
  build:
    if: github.event.pull_request.title == 'Run Block 5 restaurant build'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Reconstruct checksum-verified Block 5 generator
        shell: bash
        run: |
          cat .migration/block5hex/part00 .migration/block5hex/part01 .migration/block5hex/part02a .migration/block5hex/part02b .migration/block5hex/part03 .migration/block5hex/part04 .migration/block5hex/part05 > /tmp/block5.hex
          python - <<'PY'
          from pathlib import Path
          payload = Path('/tmp/block5.hex').read_text(encoding='utf-8').strip()
          Path('/tmp/block5.tar.gz').write_bytes(bytes.fromhex(payload))
          PY
          echo '99f2b1db68df0b28684f719304ffa1fb61c9bef39b069f5b19b16bdbc99198bc  /tmp/block5.tar.gz' | sha256sum -c -
          tar -xzf /tmp/block5.tar.gz

      - name: Generate and validate Block 5
        run: python .migration/block5/build.py

      - name: Remove temporary migration files
        run: |
          rm -rf .migration/block5 .migration/block5hex
          rm -f .github/workflows/build-block5.yml

      - name: Commit generated restaurant sites
        shell: bash
        run: |
          git config user.name 'restaurant-demo-bot'
          git config user.email 'actions@users.noreply.github.com'
          git add -A
          git diff --cached --quiet && exit 0
          git commit -m 'Build Block 5 full five-page restaurant demos [skip ci]'
          git push origin main
