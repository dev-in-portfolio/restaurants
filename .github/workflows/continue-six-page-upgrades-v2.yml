name: Continue six-page restaurant upgrades v2

on:
  push:
    branches:
      - agent/continue-restaurant-upgrades-v2
    paths:
      - .github/workflows/continue-six-page-upgrades-v2.yml

permissions:
  contents: write

concurrency:
  group: continue-six-page-restaurant-upgrades-v2
  cancel-in-progress: false

jobs:
  upgrade:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch validated base generator commit
        run: git fetch origin agent/continue-restaurant-upgrades

      - name: Run explicit-target restaurant upgrades
        run: python scripts/continue_six_page_upgrades_v2.py

      - name: Push restaurant-level commits
        shell: bash
        run: git push origin HEAD:${GITHUB_REF_NAME}
