name: Complete remaining 25 restaurant demos

on:
  pull_request:
    types: [opened, reopened, synchronize]

permissions:
  contents: write

concurrency:
  group: complete-remaining25
  cancel-in-progress: false

jobs:
  build:
    if: github.event.pull_request.title == 'Complete remaining 25 restaurant demos'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Reconstruct checksum-verified generator
        shell: bash
        run: |
          cat .migration/remaining25hex/part00 .migration/remaining25hex/part01 .migration/remaining25hex/part02 .migration/remaining25hex/part03 > /tmp/remaining25.hex
          python - <<'PY'
          from pathlib import Path
          payload = Path('/tmp/remaining25.hex').read_text(encoding='utf-8').strip()
          Path('/tmp/remaining25.py.gz').write_bytes(bytes.fromhex(payload))
          PY
          echo 'c09bb2369e0b168644fb16d8ad792fcedca9e8931f001fa0741404ed11b26f6e  /tmp/remaining25.py.gz' | sha256sum -c -
          gzip -dc /tmp/remaining25.py.gz > /tmp/remaining25.py
          python -m py_compile /tmp/remaining25.py

      - name: Generate and validate 25 full five-page demos
        run: python /tmp/remaining25.py

      - name: Remove temporary migration files
        run: |
          rm -rf .migration/remaining25hex
          rm -f .github/workflows/complete-remaining25.yml

      - name: Commit completed restaurant sites
        shell: bash
        run: |
          git config user.name 'restaurant-demo-bot'
          git config user.email 'actions@users.noreply.github.com'
          git add -A
          git diff --cached --quiet && exit 0
          git commit -m 'Complete remaining 25 full five-page restaurant demos [skip ci]'
          git push origin main
