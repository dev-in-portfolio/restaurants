name: Upgrade latest 15 restaurant demos
on:
  push:
    branches: [main]
    paths: ['.github/workflows/upgrade-latest-15.yml']
permissions:
  contents: write
jobs:
  upgrade:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Restore migration script
        shell: bash
        run: |
          mkdir -p scripts
          echo '' | base64 -d | gunzip > scripts/upgrade_restaurants.py
      - name: Generate and validate five-page demos
        run: python scripts/upgrade_restaurants.py
      - name: Commit generated static sites
        shell: bash
        run: |
          git config user.name 'restaurant-demo-bot'
          git config user.email 'actions@users.noreply.github.com'
          git add -A
          git diff --cached --quiet && exit 0
          git commit -m 'Complete latest 15 five-page demos [skip ci]'
          git push
